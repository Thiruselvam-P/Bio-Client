<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold mb-4 text-success">{{ isEdit ? 'Edit' : 'Add New' }} Product</h3>
                    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" formControlName="productName">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" formControlName="category">
                                    <optgroup label="Eco Tableware">
                                        <option value="Areca Leaf Plates">Areca Leaf Plates</option>
                                        <option value="Areca Plate">Areca Plate</option>
                                        <option value="Bagasse">Bagasse</option>
                                        <option value="Birchwood">Birchwood</option>
                                        <option value="Wooden Cutlery">Wooden Cutlery</option>
                                        <option value="Paper Cups & Bowls">Paper Cups & Bowls</option>
                                        <option value="Paper Products">Paper Products</option>
                                    </optgroup>
                                    <optgroup label="Eco Packaging">
                                        <option value="Compostable Containers">Compostable Containers</option>
                                        <option value="Eco Packaging">Eco Packaging</option>
                                        <option value="Bags and Pouches">Bags and Pouches</option>
                                    </optgroup>
                                    <optgroup label="Home & Living">
                                        <option value="Home Essentials">Home Essentials</option>
                                        <option value="Eco">Eco Friendly</option>
                                    </optgroup>
                                    <optgroup label="Fresh Produce">
                                        <option value="Kitchenware">Kitchenware</option>
                                        <option value="Fruits">Fruits</option>
                                        <option value="Drinkware">Drinkware</option>
                                        <option value="Millets">Organic Millets</option>
                                        <option value="Spices">Aromatic Spices</option>
                                        <option value="Organic Rice">Organic Rice</option>
                                        <option value="Organic">Organic</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price (Rs.)</label>
                                <input type="number" class="form-control" formControlName="price">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="4" formControlName="description"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Product Image</label>
                            <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">
                            @if (imagePreview) {
                            <div class="mt-2 text-center">
                                <img [src]="imagePreview" class="img-thumbnail" style="max-height: 200px;">
                            </div>
                            }
                        </div>
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" formControlName="availability"
                                    id="availSwitch">
                                <label class="form-check-label" for="availSwitch">Product Available</label>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" routerLink="/admin/products"
                                class="btn btn-light px-4 py-2 flex-grow-1 fw-bold">CANCEL</button>
                            <button type="submit" [disabled]="productForm.invalid || loading"
                                class="btn btn-success px-4 py-2 flex-grow-1 fw-bold">
                                {{ isEdit ? 'UPDATE PRODUCT' : 'SAVE PRODUCT' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
