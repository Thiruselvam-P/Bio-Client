<div class="login-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-4 col-md-6">

                <div class="login-card">

                    <div class="text-center mb-4">
                        <h2 class="logo-title">
                            Fresh Bio
                        </h2>
                        <p class="subtitle">Welcome Back</p>
                    </div>

                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                        <!-- Email -->
                        <div class="form-group">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" formControlName="email" placeholder="Email Address"
                                class="form-control modern-input"
                                [ngClass]="{'is-invalid': f['email'].touched && f['email'].errors}">
                            <div *ngIf="f['email'].touched && f['email'].errors" class="invalid-feedback">
                                Please enter a valid email.
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="form-group mt-3">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" formControlName="password" placeholder="Password"
                                class="form-control modern-input"
                                [ngClass]="{'is-invalid': f['password'].touched && f['password'].errors}">
                            <div *ngIf="f['password'].touched && f['password'].errors" class="invalid-feedback">
                                Password is required.
                            </div>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" [disabled]="loginForm.invalid || loading" class="btn login-btn mt-4">

                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                            Login
                        </button>

                        <!-- Error -->
                        <div *ngIf="error" class="alert alert-danger mt-3 small text-center">
                            {{error}}
                        </div>

                    </form>

                    <div class="text-center mt-4">
                        <p class="register-text">
                            Don't have an account?
                            <a routerLink="/register">Register</a>
                        </p>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>
