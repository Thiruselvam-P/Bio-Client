<div class="login-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-4 col-md-6">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <h2 class="logo-title">Reset Password</h2>
                        <p class="subtitle">Enter your new password below</p>
                    </div>

                    <form *ngIf="token" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
                        <!-- Password -->
                        <div class="form-group mb-3">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" formControlName="password" placeholder="New Password"
                                class="form-control modern-input"
                                [ngClass]="{'is-invalid': f['password'].touched && f['password'].errors}">
                            <div *ngIf="f['password'].touched && f['password'].errors" class="invalid-feedback">
                                <span *ngIf="f['password'].errors['required']">Password is required.</span>
                                <span *ngIf="f['password'].errors['minlength']">Password must be at least 8 characters.</span>
                                <span *ngIf="f['password'].errors['pattern']">Must include uppercase, lowercase, number and special character.</span>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-group">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" formControlName="confirmPassword" placeholder="Confirm Password"
                                class="form-control modern-input"
                                [ngClass]="{'is-invalid': f['confirmPassword'].touched && (f['confirmPassword'].errors || resetPasswordForm.errors?.['mismatch'])}">
                            <div *ngIf="f['confirmPassword'].touched && f['confirmPassword'].errors" class="invalid-feedback">
                                Confirm Password is required.
                            </div>
                            <div *ngIf="f['confirmPassword'].touched && resetPasswordForm.errors?.['mismatch']" class="invalid-feedback">
                                Passwords do not match.
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" [disabled]="resetPasswordForm.invalid || loading" class="btn login-btn mt-4">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                            Reset Password
                        </button>
                    </form>

                    <!-- Messages -->
                    <div *ngIf="message" class="alert alert-success mt-3 small text-center">
                        {{message}}
                    </div>
                    <div *ngIf="error" class="alert alert-danger mt-3 small text-center">
                        {{error}}
                    </div>

                    <div class="text-center mt-4">
                        <p class="register-text">
                            Back to <a routerLink="/login">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
