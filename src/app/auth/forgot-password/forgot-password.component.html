<div class="login-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-4 col-md-6">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <h2 class="logo-title">Forgot Password</h2>
                        <p class="subtitle">Enter your email to receive a reset link</p>
                    </div>

                    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
                        <!-- Email -->
                        <div class="form-group">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" formControlName="email" placeholder="Email Address"
                                class="form-control modern-input"
                                [ngClass]="{'is-invalid': f['email'].touched && f['email'].errors}">
                            <div *ngIf="f['email'].touched && f['email'].errors" class="invalid-feedback">
                                Please enter a valid email.
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" [disabled]="forgotPasswordForm.invalid || loading" class="btn login-btn mt-4">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                            Send Reset Link
                        </button>

                        <!-- Messages -->
                        <div *ngIf="message" class="alert alert-success mt-3 small text-center">
                            {{message}}
                        </div>
                        <div *ngIf="error" class="alert alert-danger mt-3 small text-center">
                            {{error}}
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="register-text">
                            Back to <a routerLink="/login">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
