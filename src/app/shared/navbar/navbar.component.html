<!-- 🟢 TIER 1: TOP PROMO BANNER (Marquee) -->
<div class="top-banner" [class.d-none]="isScrolled">
    <div class="ticker-wrap">
        <div class="ticker">
            <div class="ticker-item" *ngFor="let offer of offers; let last = last">
                {{ offer }} &nbsp;&nbsp; {{ !last ? '|' : '' }} &nbsp;&nbsp;
            </div>
        </div>
    </div>
</div>

<!-- ⚪ MAIN NAVIGATION: CENTERED LOGO STYLE -->
<header class="main-header shadow-sm sticky-top" [class.scrolled]="isScrolled">
    <div class="container-fluid px-lg-5">
        <div class="header-inner">

            <!-- Left Side Links -->
            <nav class="nav-side nav-left d-none d-lg-flex">
                <ul class="nav-list">
                    <li><a routerLink="/home" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}">Home</a></li>
                    <li><a routerLink="/about" routerLinkActive="active">About Us</a></li>

                    <li><a routerLink="/products" routerLinkActive="active">Products</a></li>
                    <li><a routerLink="/services" routerLinkActive="active">Services</a></li>
                </ul>
            </nav>

            <!-- Center Logo -->
            <div class="header-logo">
                <a routerLink="/home" class="logo-link">
                    <img src="logofin.png" style="height: 100px;" width="100px" alt="Bio Organic" class="brand-logo-mj">
                </a>
            </div>

            <!-- Right Side Links & Icons -->
            <nav class="nav-side nav-right">
                <ul class="nav-list d-none d-lg-flex">

                    <li><a routerLink="/contact" routerLinkActive="active">Contact Us</a></li>

                    <!-- My Account / Login -->
                    <li class="dropdown" *ngIf="authService.currentUserValue as user; else loginBlock">
                        <a class="nav-link-mj cursor-pointer dropdown-toggle" data-bs-toggle="dropdown">
                            My Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><a class="dropdown-item" routerLink="/admin/dashboard" *ngIf="user?.role === 'ADMIN'"><i
                                        class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                            <li><a class="dropdown-item" routerLink="/my-orders"><i class="bi bi-bag-check me-2"></i>My
                                    Orders</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" (click)="logout()"><i
                                        class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                    <ng-template #loginBlock>
                        <li><a routerLink="/login">Login</a></li>
                    </ng-template>
                </ul>

                <!-- Utility Icons -->
                <div class="header-icons ms-lg-4">
                    <!-- Expandable Search -->
                    <div class="search-wrap" [class.search-open]="searchOpen">
                        <input #searchInput type="text" class="search-input" placeholder="Search products..."
                            [(ngModel)]="searchTerm" (keyup.enter)="search()" />
                        <button class="icon-btn search-trigger" (click)="toggleSearch()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    <a routerLink="/cart" class="icon-btn cart-btn">
                        <i class="bi bi-cart3"></i>
                        <span class="badge-mj">{{ cartCount }}</span>
                    </a>

                    <!-- Mobile Toggle -->
                    <button class="d-lg-none icon-btn ms-2">
                        <i class="bi bi-list fs-3"></i>
                    </button>
                </div>
            </nav>

        </div>
    </div>
</header>
